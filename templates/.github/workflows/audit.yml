name: audit
on:
  pull_request:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install audit tools
        run: |
          pipx install slither-analyzer solc-select
          solc-select install {{SOLC_VERSION}} && solc-select use {{SOLC_VERSION}}
          npm i -g solhint @cyfrin/aderyn

      - run: make audit

      - name: Run slither
        continue-on-error: true
        run: make slither || true

      - name: Rebuild summary with slither findings
        run: make summary

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: reports/

      - name: Post summary as PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: reports/summary.md
          header: audit-summary

  nightly-fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go install github.com/crytic/medusa@latest
      - run: make fuzz
